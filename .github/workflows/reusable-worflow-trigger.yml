
name: reusable-workflow-for-docker build and push to GHCR # This workflow is designed to be reusable and can be called from other workflows in different repositories. It performs a CI pipeline that includes running CodeQL analysis, SonarQube analysis, building a Docker image, and publishing it to GitHub Container Registry (GHCR). The workflow is triggered on push and pull request events to the main branch.
on:
  workflow_dispatch: # This allows the workflow to be manually triggered from the GitHub Actions tab in the repository.
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  actions: read
  security-events: write
  contents: read
  packages: write

jobs:

  ci-pipeline-job:
    uses: vidhya101/reusable-workflows-vidhya101/.github/workflows/ci-pipeline.yml@main
    with:
      run_codeql: true
      run_sonarqube: true
      run_build: true
      run_ghcr_publish: true
    secrets:

      # DockerHub username used for docker login
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      # DockerHub password or access token
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      # SonarQube authentication token used for
      # sending code analysis results to SonarCloud
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-with-kubectl:
    needs: ci-pipeline-job
    runs-on: github-action-scaleset-demo
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
