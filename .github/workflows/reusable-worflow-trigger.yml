name: reusable-workflow-for-docker build and push to GHCR # Workflow name visible in GitHub Actions UI

on:
  # Trigger workflow when code is pushed to main branch
  pull_request:
    branches:
    - main # Trigger workflow when PR is opened/updated targeting main

permissions:
  actions: read # Allows reading GitHub Actions metadata
  security-events: write # Required for CodeQL to upload results
  contents: read # Read access to repository content
  packages: write # Required to push Docker image to GHCR

env:
  OCI_REGISTRY: ghcr.io
  OCI_REPOSITORY: ${{github.repository_owner}}/helm-charts # This will be in the format owner/repo, e.g., vidhyashankergoel/reusable-workflows-vidhya101

jobs:

  ci-pipeline-job:  # ci-pipeline-job will run first when workflow is triggered
    uses: vidhyashankergoel/reusable-workflows-vidhya101/.github/workflows/ci-pipeline.yml@main  
    # Calling reusable workflow from another repository

    with:
      run_codeql: true         # Enable CodeQL security scan
      run_sonarqube: true      # Enable SonarQube analysis
      run_build: true          # Enable Docker build step
      run_ghcr_publish: true   # Enable pushing image to GHCR

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}   # DockerHub login username
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}   # DockerHub password/token
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}           # SonarQube authentication token

  deploy-with-kubectl: # deploy-with-kubectl job will run after ci-pipeline-job completes successfully
    needs: ci-pipeline-job   # This job will run after ci-pipeline-job completes successfully
    uses: vidhyashankergoel/reusable-workflows-vidhya101/.github/workflows/deploy-with-kubectl.yml@main  
    # Calling another reusable workflow for deployment

    with:
      ENVIRONMENT: STAGING
      IMAGE_NAME: ghcr.io/vidhyashankergoel/vidhya_app

    secrets:
      kubeconfig: ${{ secrets.KUBECONFIG }}  # Kubernetes config file content as a secret

  selenium-test: # selenium-test job will run after deploy-with-kubectl job completes successfully
    needs: deploy-with-kubectl 
    uses: vidhyashankergoel/reusable-workflows-vidhya101/.github/workflows/Selenium-test.yml@main
    with:
      ENVIRONMENT: STAGING  # Pass the environment variable to the Selenium test workflow
                            # Changed the base URL http://192.168.56.10:30082 to staging as the Selenium test workflow will use the ENVIRONMENT variable to determine the base URL for testing

  publish-helm-charts:
    needs: selenium-test # This job will run after selenium-test job completes successfully
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v5

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: v3.12.0

    - name: check Helm Version
      run: helm version

    - name: Install yq for YAML processing
      run: |
        sudo curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq
        yq --version

    - name: update image name in deployment YAML
      run: |
        export IMAGE_TAGS="${{ github.run_id}}-${GITHUB_SHA::7}"
        export VERSION="0.1.0-${IMAGE_TAGS}"
        yq e '.image.tag = strenv(IMAGE_TAGS)' charts/values.yaml -i
        yq e '.version = strenv(VERSION)' charts/Chart.yaml -i
        yq e '.appVersion = strenv(IMAGE_TAGS)' charts/Chart.yaml -i
        cat charts/values.yaml

        cat charts/Chart.yaml      

    - name: Lint Helm Charts
      run: helm lint charts/

    - name: Package Helm Charts
      run: |
        mkdir -p packaged-charts
        helm package charts/ -d packaged-charts/
        ls -ltr ./packaged-charts

    - name: Login to GHCR (OCI)
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{env.OCI_REGISTRY}} -u ${{ github.actor }} --password-stdin


    - name: Push Helm Charts to GHCR
      run: |
        export IMAGE_TAGS="${{ github.run_id}}-${GITHUB_SHA::7}"
        export VERSION="0.1.0-${IMAGE_TAGS}"
        helm push packaged-charts/vidhya-app-${VERSION}.tgz oci://${{env.OCI_REGISTRY}}/${{env.OCI_REPOSITORY}}

    - name: Logout from GHCR
      run: helm registry logout ${{env.OCI_REGISTRY}}