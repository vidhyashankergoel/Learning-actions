name: reusable-workflow-for-docker build and push to GHCR  # Workflow name visible in GitHub Actions UI

on:
  push:
    branches:
      - main              # Trigger workflow when code is pushed to main branch

  pull_request:
    branches:
      - main              # Trigger workflow when PR is opened/updated targeting main

permissions:
  actions: read            # Allows reading GitHub Actions metadata
  security-events: write   # Required for CodeQL to upload results
  contents: read           # Read access to repository content
  packages: write          # Required to push Docker image to GHCR

jobs:

  ci-pipeline-job:
    uses: vidhyashankergoel/reusable-workflows-vidhya101/.github/workflows/ci-pipeline.yml@main  
    # Calling reusable workflow from another repository

    with:
      run_codeql: true         # Enable CodeQL security scan
      run_sonarqube: true      # Enable SonarQube analysis
      run_build: true          # Enable Docker build step
      run_ghcr_publish: true   # Enable pushing image to GHCR

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}   # DockerHub login username
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}   # DockerHub password/token
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}           # SonarQube authentication token

  deploy-with-kubectl:
    needs: ci-pipeline-job   # This job will run after ci-pipeline-job completes successfully
    uses: vidhyashankergoel/reusable-workflows-vidhya101/.github/workflows/deploy-with-kubectl.yml@main  
    # Calling another reusable workflow for deployment

    with:
      ENVIRONMENT: STAGING
      IMAGE_NAME: ghcr.io/vidhyashankergoel/vidhya_app

    secrets:
      kubeconfig: ${{ secrets.KUBECONFIG }}  # Kubernetes config file content as a secret


  selenium-test:
    environment: STAGING
    needs: deploy-with-kubectl
    runs-on: github-action-scaleset-demo
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup python 
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg ca-certificates
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable


      - name: Install Dependencies
        run: |
          pip install -r requirements-tests.txt

      - name: Run Selenium Tests
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}  # Base URL of the deployed application for testing
        run: |
          mkdir -p reports
          pytest tests/ --html=reports/selenium_report.html --self-contained-html

      - name: Upload Selenium Test Report
        uses: actions/upload-artifact@v5.0.0

        with:
          name: selenium-test-report
          path: reports/