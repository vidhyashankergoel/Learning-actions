name: docker-build-push-pipeline

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# This pipeline runs automatically when:
# 1. Code is pushed to the main branch
# 2. A pull request targets the main branch
#
# This ensures every change is validated before merging.

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

# ============================================================
# JOB 1 : UNIT TEST EXECUTION
# ============================================================
# This job validates the application before building images.
#
# Tasks performed:
# - Download source code
# - Install Python
# - Install dependencies
# - Run automated tests
# - Generate coverage report
# - Upload coverage artifact for later jobs

  unit-tests:

    name: Running unit test
    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------------
      # STEP 1 : DOWNLOAD REPOSITORY CODE
      # ------------------------------------------------------
      # GitHub runners start empty.
      # This action downloads the repository code
      # so the pipeline can access the application files.

      - name: Checkout Code
        uses: actions/checkout@v4



      # ------------------------------------------------------
      # STEP 2 : INSTALL PYTHON RUNTIME
      # ------------------------------------------------------
      # Installs Python 3.10 on the runner.
      # This ensures the environment matches
      # the application runtime.

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'



      # ------------------------------------------------------
      # STEP 3 : INSTALL PROJECT DEPENDENCIES
      # ------------------------------------------------------
      # Installs required Python libraries defined in
      # requirements.txt using pip package manager.

      - name: Installing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      # ------------------------------------------------------
      # STEP 4 : RUN UNIT TESTS + GENERATE COVERAGE
      # ------------------------------------------------------
      # pytest executes all tests.
      #
      # junitxml → creates test result file
      # coverage.xml → used by SonarQube
      # term-missing → shows uncovered lines

      - name: Run unit tests
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v



      # ------------------------------------------------------
      # STEP 5 : SAVE TEST REPORTS AS ARTIFACT
      # ------------------------------------------------------
      # Artifacts allow files to be shared between jobs.
      #
      # This uploads the coverage report so the SonarQube
      # job can download and analyze it later.

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: reports/



# ============================================================
# JOB 2 : CODEQL SECURITY SCAN
# ============================================================
# CodeQL scans source code for security vulnerabilities.
#
# Examples detected:
# SQL injection
# command injection
# hardcoded credentials
# unsafe user input

  codeql:

    name: CodeQL security scan
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:

      # Download repository code
      - name: Checkout repository
        uses: actions/checkout@v4



      # Initialize CodeQL engine
      # Converts code into queryable database

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}



      # Run security analysis queries
      # Results appear in GitHub Security tab

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"



# ============================================================
# JOB 3 : SONARQUBE CODE QUALITY ANALYSIS
# ============================================================
# SonarQube analyzes maintainability and code quality.
#
# Detects:
# bugs
# code smells
# duplicate code
# technical debt
# coverage percentage

  sonarqube:

    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:

      # Download source code with full git history
      # SonarQube uses commit history for metrics

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0



      # Download coverage report generated by tests
      # SonarQube uses this to calculate test coverage

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: code-coverage-report
          path: reports/



      # Run SonarQube analysis
      # Sends code + coverage metrics to SonarCloud dashboard

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}



      # Enforce quality standards
      #
      # Quality Gate checks conditions like:
      # coverage > threshold
      # no critical bugs
      # maintainability rating

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}



# ============================================================
# JOB 4 : BUILD DOCKER IMAGE
# ============================================================
# This job packages the application into a container image.

  Build:

    name: Build Docker image
    runs-on: ubuntu-latest

    # Build only starts after security + quality checks pass
    needs: [codeql, sonarqube]

    # Run only if previous jobs succeeded
    if: success()

    # Export image tag so later jobs can reuse it
    outputs:
      image-tags: ${{ steps.vars.outputs.IMAGE_TAGS }}

    steps:

      # Download repository source code

      - name: Checkout repository
        uses: actions/checkout@v4



      # Setup Docker Buildx
      #
      # Buildx enables advanced Docker builds
      # such as caching and multi-platform images

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0



      # Generate unique Docker image tag
      #
      # github.run_id → unique workflow execution id
      # GITHUB_SHA::7 → first 7 characters of commit hash
      #
      # Example tag:
      # 8347562-a12bcde

      - name: Generate image tag
        id: vars
        run: |
          IMAGE_TAGS=${{ github.run_id }}-${GITHUB_SHA::7}
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT



      # Build Docker image from Dockerfile
      #
      # context → location of application code
      # file → Dockerfile path
      # tags → image name + version
      #
      # load:true loads the built image into the runner
      # local docker cache so later steps can access it

      - name: Build Image(no push)
        uses: docker/build-push-action@v4.0.0
        with:
          context: .
          file: ./Dockerfile
          tags: vidhya101_app:${{ steps.vars.outputs.IMAGE_TAGS }}
          push: false
          load: true



      # Convert Docker image into TAR file
      #
      # docker save exports image from local Docker engine

      - name: Save Docker image as artifact
        run: |
          docker save vidhya101_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o vidhya_app_docker_image.tar



      # Upload TAR file so next job can download it

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidhya_app_image
          path: vidhya_app_docker_image.tar



# ============================================================
# JOB 5 : PUSH IMAGE TO DOCKER HUB
# ============================================================
# This job publishes the built container image.

  publish-DOckerHub:

    name: Publish image to DockerHub
    runs-on: ubuntu-latest
    needs: Build
    if: success()

    steps:

      # Download Docker image TAR file produced by Build job

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: vidhya_app_image
          path: .



      # Load Docker image into local Docker engine

      - name: Load Docker image from artifact
        run: |
          docker load -i vidhya_app_docker_image.tar



      # Authenticate with DockerHub using secrets

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}



      # Tag image for DockerHub registry
      #
      # Example final image:
      # dockerhubuser/vidhya_app:8347562-a12bcde

      - name: Tag image
        run: |
          IMAGE_TAGS="${{ needs.Build.outputs.image-tags }}"
          docker tag vidhya101_app:$IMAGE_TAGS ${{ secrets.DOCKER_USERNAME }}/vidhya_app:$IMAGE_TAGS



      # Push image to DockerHub registry

      - name: Push image to Docker Hub
        run: |
          IMAGE_TAGS="${{ needs.Build.outputs.image-tags }}"
          docker push ${{ secrets.DOCKER_USERNAME }}/vidhya_app:$IMAGE_TAGS