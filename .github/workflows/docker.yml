
name: python-workflow

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  # ==========================================================
  # JOB 1 : UNIT TEST EXECUTION
  # ==========================================================
  # This job validates the application functionality.
  #
  # Responsibilities:
  #
  # 1. Download repository source code
  # 2. Install Python runtime
  # 3. Install project dependencies
  # 4. Execute automated unit tests
  # 5. Generate code coverage report
  # 6. Upload reports as artifacts

  unit-tests:

    name: Running unit test

    # GitHub will start a fresh Linux runner
    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------------
      # STEP 1 : CHECKOUT SOURCE CODE
      # ------------------------------------------------------
      # GitHub runners start with an EMPTY filesystem.
      #
      # This step downloads the repository code
      # from GitHub into the runner workspace.

      - name: Checkout Code
        uses: actions/checkout@v4



      # ------------------------------------------------------
      # STEP 2 : INSTALL PYTHON RUNTIME
      # ------------------------------------------------------
      # This installs Python version 3.10.
      #
      # Many projects require a specific runtime version
      # to ensure compatibility.

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'



      # ------------------------------------------------------
      # STEP 3 : INSTALL PROJECT DEPENDENCIES
      # ------------------------------------------------------
      # Most Python applications rely on external libraries.
      #
      # These dependencies are defined inside:
      #
      # requirements.txt
      #
      # pip is Python's package manager used to install them.

      - name: Installing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      # ------------------------------------------------------
      # STEP 4 : RUN UNIT TESTS + GENERATE COVERAGE
      # ------------------------------------------------------
      # pytest is a widely used Python testing framework.
      #
      # This command performs multiple tasks:
      #
      # 1. Creates a reports directory
      # 2. Executes all test cases
      # 3. Generates test result XML file
      # 4. Calculates code coverage
      # 5. Outputs coverage report for SonarQube
      #
      # coverage.xml will later be consumed by SonarQube
      # to measure test coverage metrics.

      - name: Run unit tests
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v



      # ------------------------------------------------------
      # STEP 5 : UPLOAD REPORTS AS ARTIFACTS
      # ------------------------------------------------------
      # GitHub runners are temporary machines.
      #
      # When the job finishes the VM is destroyed.
      #
      # To preserve generated files we upload them
      # as artifacts.
      #
      # These artifacts can be downloaded by other jobs.

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: reports/



  # ==========================================================
  # JOB 2 : CODEQL SECURITY ANALYSIS
  # ==========================================================
  # CodeQL is GitHub's Static Application Security Testing tool.
  #
  # Static analysis means:
  # The source code is analyzed WITHOUT executing it.
  #
  # CodeQL scans the code to detect security vulnerabilities.
  #
  # Examples of vulnerabilities detected:
  #
  # - SQL Injection
  # - Command Injection
  # - Hardcoded secrets
  # - Unsafe deserialization
  # - Path traversal attacks
  #
  # Results appear in:
  # GitHub → Security → Code Scanning Alerts

  codeql:

    name: CodeQL security scan

    runs-on: ubuntu-latest


    # ----------------------------------------------------------
    # PERMISSIONS
    # ----------------------------------------------------------
    # GitHub workflows operate with restricted permissions.
    #
    # CodeQL needs permission to publish security findings
    # back to GitHub Security Dashboard.

    permissions:
      actions: read
      contents: read
      security-events: write



    # ----------------------------------------------------------
    # MATRIX STRATEGY
    # ----------------------------------------------------------
    # Matrix strategy allows scanning multiple languages.
    #
    # Example:
    #
    # python
    # java
    # javascript
    #
    # Here we scan only Python.

    strategy:
      fail-fast: false
      matrix:
        language: ['python']



    steps:

      # Download source code
      - name: Checkout repository
        uses: actions/checkout@v4



      # ------------------------------------------------------
      # INITIALIZE CODEQL ENGINE
      # ------------------------------------------------------
      # This step converts the source code into
      # a CodeQL database.
      #
      # The database represents:
      #
      # functions
      # variables
      # data flows
      # execution paths

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}



      # ------------------------------------------------------
      # RUN SECURITY QUERIES
      # ------------------------------------------------------
      # CodeQL executes predefined security queries
      # against the code database.
      #
      # Detected vulnerabilities are reported back
      # to GitHub Security Dashboard.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"



  # ==========================================================
  # JOB 3 : SONARQUBE QUALITY ANALYSIS
  # ==========================================================
  # SonarQube performs deep code quality analysis.
  #
  # Unlike CodeQL which focuses on SECURITY,
  # SonarQube focuses on CODE HEALTH.
  #
  # SonarQube detects:
  #
  # Bugs
  # Code smells
  # Maintainability issues
  # Duplicate code
  # Technical debt
  # Security hotspots
  # Test coverage
  #
  # SonarQube generates a complete quality dashboard
  # for the repository.

  sonarqube:

    name: SonarQube Scan

    runs-on: ubuntu-latest

    # This ensures SonarQube runs ONLY after tests complete
    needs: unit-tests

    steps:

      # ------------------------------------------------------
      # DOWNLOAD REPOSITORY CODE
      # ------------------------------------------------------
      # fetch-depth:0 downloads full git history.
      #
      # SonarQube uses git history to compute metrics
      # like code changes and blame analysis.

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0



      # ------------------------------------------------------
      # DOWNLOAD TEST COVERAGE ARTIFACT
      # ------------------------------------------------------
      # SonarQube uses coverage data generated by pytest
      # to calculate test coverage percentage.

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: code-coverage-report
          path: reports/



      # ------------------------------------------------------
      # RUN SONARQUBE ANALYSIS
      # ------------------------------------------------------
      # This step sends the codebase to SonarQube
      # for analysis.
      #
      # SONAR_TOKEN is stored securely in GitHub Secrets.
      #
      # The scan results appear in the SonarCloud dashboard.

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}



      # ------------------------------------------------------
      # SONARQUBE QUALITY GATE
      # ------------------------------------------------------
      # Quality Gate is a policy enforcement mechanism.
      #
      # It ensures the code meets predefined standards
      # before being merged or deployed.
      #
      # Example rules inside a Quality Gate:
      #
      # Coverage must be > 80%
      # No critical vulnerabilities
      # No blocker bugs
      # Maintainability rating A
      #
      # If the Quality Gate fails:
      #
      # ❌ Workflow fails
      # ❌ PR should not be merged

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  Build:

    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [codeql, sonarqube]
    if: success()
    outputs:
      image-tags: ${{ steps.vars.outputs.IMAGE_TAGS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Generate image tag
        id: vars
        run: |
          IMAGE_TAGS=${{github.run_id}}-${GITHUB_SHA::7}
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT

      - name: Build Image(no push)
        uses: docker/build-push-action@v4.0.0
        with:
          context: .
          file: ./Dockerfile
          tags: vidhya101_app:${{ steps.vars.outputs.IMAGE_TAGS }}
          push: false

      - name: Save Docker image as artifact
        run:  |
          docker save vidhya101_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o vidhya_app_docker_image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4

        with:
          name: vidhya_app_image    
          path: vidhya_app_docker_image.tar