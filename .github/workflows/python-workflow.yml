# ============================================================
# WORKFLOW NAME
# ============================================================
# This name will appear in the GitHub Actions UI
# under the Actions tab.

name: python-workflow


# ============================================================
# WORKFLOW TRIGGERS
# ============================================================
# This workflow runs automatically when:
#
# 1. Code is pushed to the main branch
# 2. A Pull Request is created or updated targeting main

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


# ============================================================
# JOB DEFINITIONS
# ============================================================
# Jobs define the tasks executed by the workflow.
# Each job runs on a fresh virtual machine.

jobs:

  # ==========================================================
  # JOB: RUN PYTHON UNIT TESTS
  # ==========================================================
  # This job performs CI validation for a Python project.
  #
  # Steps:
  # 1. Download repository code
  # 2. Install Python runtime
  # 3. Install project dependencies
  # 4. Execute unit tests

  unit-tests:

    name: Running unit test

    # GitHub provides a fresh Ubuntu runner VM
    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------------
      # STEP 1: CHECKOUT REPOSITORY CODE
      # ------------------------------------------------------
      # GitHub runners start with an empty filesystem.
      #
      # This action downloads the repository code
      # to the runner workspace.

      - name: Checkout Code
        uses: actions/checkout@v4



      # ------------------------------------------------------
      # STEP 2: SETUP PYTHON RUNTIME
      # ------------------------------------------------------
      # This installs Python 3.10 on the runner.
      #
      # Without this step the runner may not have
      # the correct Python version.

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'



      # ------------------------------------------------------
      # STEP 3: INSTALL PROJECT DEPENDENCIES
      # ------------------------------------------------------
      # Most Python projects require external libraries.
      #
      # These dependencies are defined inside
      # the file: requirements.txt

      - name: Installing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      # ------------------------------------------------------
      # STEP 4: RUN UNIT TESTS
      # ------------------------------------------------------
      # pytest will automatically discover and execute
      # test cases present in the repository.

      - name: Run unit tests
        run: |
          mkdir reports/ 
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml --cov-report=term-missing -v


#upload the report generated in previous step as an artifact to GitHub Actions
      - name: upload code coverage report 
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: reports/



# ============================================================
# WORKFLOW EXECUTION FLOW
# ============================================================
#
# Step 1
# A developer pushes code to the main branch
# OR opens a pull request targeting main.
#
# Step 2
# GitHub detects the event and triggers this workflow.
#
# Step 3
# GitHub provisions a fresh runner:
# ubuntu-latest
#
# Step 4
# Job "unit-tests" begins execution.
#
# Step 5
# Checkout step downloads the repository code
# into the runner workspace.
#
# Step 6
# Python 3.10 is installed using setup-python action.
#
# Step 7
# pip upgrades itself to the latest version.
#
# Step 8
# pip installs all project dependencies defined
# inside requirements.txt.
#
# Step 9
# pytest runs the unit test suite.
#
# Step 10
# If all tests pass → workflow succeeds
# If any test fails → workflow fails
#
# This mechanism ensures that broken code
# never gets merged into the main branch.
#
# This is a fundamental concept of CI pipelines.
#
# ============================================================
