name: context   # Workflow name visible in GitHub Actions UI

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# This workflow runs when specific events happen in the repository.
#
# Two events are configured here:
#
# 1) push
# 2) pull_request
#
# PUSH EVENT
# ----------
# Triggered when someone runs:
#
#   git push origin <branch>
#
# Example:
#
#   git push origin main
#
# GitHub receives the push event and checks the branch list.
# If the branch matches, the workflow is triggered.
#
# PULL REQUEST EVENT
# ------------------
# Triggered when a pull request is opened, synchronized,
# or updated targeting a specific branch.

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


# ============================================================
# GLOBAL ENVIRONMENT VARIABLES
# ============================================================
# These variables are available to ALL jobs and steps unless
# overridden at job-level or step-level.

env:
  ENV_TYPE: Dev
  APP_USER: vidhya101
  APP_PORT: 80


jobs:

# ==========================================================
# JOB 1 : CREATE AND UPLOAD ARTIFACTS
# ==========================================================
  job1:
    name: job1
    runs-on: ubuntu-latest

    steps:

      - name: step-1 basic system information
        run: |
          pwd
          ls -ltr
          hostname

        # pwd
        #   Prints working directory of runner

        # ls -ltr
        #   Lists files in workspace

        # hostname
        #   Shows runner hostname


      - name: step-2 checkout repository
        uses: actions/checkout@v4

        # GitHub runners start with empty workspace
        # checkout action pulls repository code into runner


      - name: step-3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt


      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt

        # Artifacts allow files to move between jobs


      - name: upload directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/


      - name: upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths
          path: |
            ./myartifact.txt
            artifacts/


      - name: upload multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths-with-exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt

        # ! is exclusion pattern


# ==========================================================
# JOB 2 : DOWNLOAD ARTIFACT AND USE ENV + SECRETS
# ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest
    needs: job1

    steps:

      - name: check workspace before download
        run: |
          pwd
          ls -ltr


      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file


      - name: Referring Env variable
        run: |
          echo "[INFO] Running deployment for $ENV_TYPE with user $APP_USER."
          echo "[INFO] Once deployment completes, application will be accessible on port $APP_PORT."

        # Environment variables defined in env block
        # are accessed inside shell using:
        #
        # $VARIABLE_NAME
        #
        # Example:
        #
        # $ENV_TYPE
        # $APP_USER
        # $APP_PORT


      - name: referring repo secret
        run: |
          echo "[INFO] Application password is ${{ secrets.APP_PASSWORD }}."

        # Repository secret accessed using:
        #
        # ${{ secrets.SECRET_NAME }}
        #
        # Secrets must be created in:
        #
        # Repository → Settings
        # → Secrets and Variables
        # → Actions
        # → New Repository Secret


# ==========================================================
# JOB 3 : USING GITHUB CONTEXTS AND BUILT-IN VARIABLES
# ==========================================================
  job3:
    name: job3
    runs-on: ubuntu-latest

    steps:

      - name: referring contexts and built-in variables
        run: |
          echo "[INFO] Triggered by event: ${{ github.event_name }}"
          echo "[INFO] Change made by user: ${{ github.actor }}"
          echo "[INFO] Branch where change happened: ${{ github.ref_name }}"
          echo "[INFO] Runner OS: ${{ runner.os }}"
          echo "[INFO] Current Job ID: ${{ job.check_run_id }}"

        # ======================================================
        # WHAT ARE GITHUB CONTEXTS
        # ======================================================
        #
        # Contexts are runtime objects that provide information
        # about the workflow execution environment.
        #
        # They allow workflows to dynamically access metadata
        # such as:
        #
        # repository name
        # branch name
        # commit SHA
        # triggering user
        # event type
        # runner environment
        #
        # Contexts are accessed using:
        #
        # ${{ context_name.property }}
        #
        # Example:
        #
        # ${{ github.actor }}


        # ======================================================
        # COMMON CONTEXTS USED IN GITHUB ACTIONS
        # ======================================================

        # github
        #
        # Contains metadata about the repository
        # and the event that triggered the workflow.
        #
        # Examples:
        #
        # github.repository
        # github.ref
        # github.ref_name
        # github.actor
        # github.event_name
        # github.sha


        # runner
        #
        # Provides information about the runner
        # executing the workflow.
        #
        # Examples:
        #
        # runner.os
        # runner.arch
        # runner.temp


        # job
        #
        # Contains information about the current job.
        #
        # Example:
        #
        # job.status
        # job.check_run_id


        # env
        #
        # Allows access to environment variables.
        #
        # Example:
        #
        # ${{ env.ENV_TYPE }}


        # secrets
        #
        # Allows access to encrypted secrets.
        #
        # Example:
        #
        # ${{ secrets.APP_PASSWORD }}


# ============================================================
# IMPORTANT CONCEPT
# ============================================================

# GitHub evaluates contexts BEFORE the runner executes steps.
#
# Then the workflow is sent to the runner machine where
# environment variables and shell commands are executed.

# Order of evaluation

# 1) GitHub evaluates expressions
# 2) Runner VM starts
# 3) Steps execute
# 4) Shell commands run
