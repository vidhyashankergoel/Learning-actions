name: env-variables   # Workflow name visible in GitHub Actions UI

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# This workflow runs when code is pushed to specific branches.
# Only pushes to the branches listed below will trigger it.

on:
  push:
    branches:
      - main           # Runs when code is pushed to main branch
  pull_request:
    branches:
      - main           # Runs when a PR is created or updated targeting main


# ============================================================
# GLOBAL ENVIRONMENT VARIABLES
# ============================================================
# These variables are available to ALL jobs and ALL steps
# inside this workflow unless overridden at job or step level.

env:
  ENV_TYPE: Dev
  APP_USER: vidhya101
  APP_PORT: 80


jobs:

  # ==========================================================
  # JOB 1 : CREATE AND UPLOAD ARTIFACTS
  # ==========================================================
  job1:
    name: job1
    runs-on: ubuntu-latest      # GitHub provisions a fresh Ubuntu runner VM

    steps:

      - name: step-1 basic system information
        run: |
          pwd
          ls -ltr
          hostname
        # pwd
        #   Prints the current working directory of the runner
        #
        # ls -ltr
        #   Lists files present in the workspace
        #
        # hostname
        #   Displays the hostname of the runner VM


      - name: step-2 checkout repository
        uses: actions/checkout@v4
        # Downloads repository source code to the runner workspace
        #
        # GitHub runners start with an empty filesystem,
        # so checkout is required if workflow needs repo files.


      - name: step-3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt

        # Files created:
        #
        # myartifact.txt
        # artifacts/list.txt
        # artifacts/hostname.txt


      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt

        # Uploads a single file as an artifact
        #
        # Artifacts allow sharing files between jobs.


      - name: upload directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/

        # Uploads entire directory as artifact


      - name: upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths
          path: |
            ./myartifact.txt
            artifacts/

        # Uploads multiple paths under one artifact name


      - name: upload multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths-with-exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt

        # Uploads files but excludes hostname.txt
        #
        # "!" is used for exclusion patterns


  # ==========================================================
  # JOB 2 : DOWNLOAD SINGLE FILE ARTIFACT
  # ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest
    needs: job1                 # job2 starts only after job1 finishes successfully

    steps:

      - name: check workspace before download
        run: |
          pwd
          ls -ltr

        # Shows workspace before artifact download


      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file

        # Downloads artifact created in job1


      - name: Referring Env variable
        run: |
          echo "[INFO] Running deployment for $ENV_TYPE with user $APP_USER."
          echo "[INFO] Once deployment completes, application will be accessible on port $APP_PORT."

        # Here we are referencing environment variables
        #
        # $ENV_TYPE
        # $APP_USER
        # $APP_PORT
        #
        # These values come from the workflow-level env block.



# ============================================================
# ENVIRONMENT VARIABLES EXPLAINED
# ============================================================

# What are Environment Variables?
#
# Environment variables are key-value pairs used to store
# configuration values that workflows or applications can read
# during execution.
#
# Example:
#
# ENV_TYPE = Dev
# APP_USER = vidhya101
# APP_PORT = 80


# Why we use environment variables
#
# They help avoid hardcoding values multiple times.
#
# Benefits:
#
# - Reusability
# - Maintainability
# - Centralized configuration
# - Cleaner workflows
#
# Instead of writing the same value repeatedly,
# we define it once and reuse it everywhere.


# Example WITHOUT env variables
#
# echo "Deploying Dev application"
# echo "Deploying Dev application"
# echo "Deploying Dev application"


# Example WITH env variables
#
# env:
#   ENV_TYPE: Dev
#
# echo "Deploying $ENV_TYPE application"


# ============================================================
# WHERE ENV VARIABLES CAN BE DEFINED
# ============================================================

# Environment variables can be defined at three levels.


# 1) Workflow level
#
# env:
#   APP_ENV: production
#
# Available to all jobs and steps.


# 2) Job level
#
# jobs:
#   build:
#     env:
#       APP_ENV: production
#
# Available only inside that job.


# 3) Step level
#
# steps:
#   - name: Step specific env
#     env:
#       APP_ENV: production
#
# Available only inside that step.


# ============================================================
# VARIABLE PRIORITY (IMPORTANT)
# ============================================================

# Step-level variables override job-level variables.
#
# Job-level variables override workflow-level variables.

# Example priority:

# Step env  >  Job env  >  Workflow env


# ============================================================
# HOW TO ACCESS ENV VARIABLES
# ============================================================

# Inside shell scripts:

# $VARIABLE_NAME

# Example:
#
# echo $ENV_TYPE


# Inside GitHub expressions:

# ${{ env.VARIABLE_NAME }}

# Example:
#
# if: ${{ env.ENV_TYPE == 'Dev' }}


# ============================================================
# COMMON USE CASES IN CI/CD
# ============================================================

# Environment variables are commonly used for:

# Application configuration
# Docker image tags
# Deployment environment names
# API endpoints
# Build parameters
# Feature flags


# Example CI/CD usage

# env:
#   IMAGE_NAME: myapp
#   VERSION: v1

# run: docker build -t $IMAGE_NAME:$VERSION .


# ============================================================
# IMPORTANT NOTE
# ============================================================

# Environment variables are NOT secure.

# Sensitive data such as:

# passwords
# tokens
# API keys

# must be stored in GitHub Secrets instead of env variables.

# Example:

# env:
#   DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
