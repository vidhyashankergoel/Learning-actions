name: download-artifact-actions   # Workflow name visible in GitHub Actions UI
                                  # Demonstrates uploading and downloading artifacts between jobs

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# The workflow runs whenever a push occurs in the repository
on:
  push:

jobs:

  # ==========================================================
  # JOB 1 : CREATE AND UPLOAD ARTIFACTS
  # ==========================================================
  job1:
    name: job1
    runs-on: ubuntu-latest

    steps:

      - name: step-1 basic system information
        run: |
          pwd
          ls -ltr
          hostname
        # pwd
        #   prints current working directory
        #
        # ls -ltr
        #   lists files in workspace
        #
        # hostname
        #   shows runner hostname


      - name: step-2 checkout repository
        uses: actions/checkout@v4
        # downloads repository source code to the runner


      - name: step-3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
        # files created:
        #
        # myartifact.txt
        # artifacts/list.txt
        # artifacts/hostname.txt


      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt
        # uploads a single file artifact


      - name: upload directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/
        # uploads entire directory


      - name: upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths
          path: |
            ./myartifact.txt
            artifacts/
        # uploads multiple paths


      - name: upload multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths-with-exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt
        # uploads files but excludes hostname.txt


  # ==========================================================
  # JOB 2 : DOWNLOAD SINGLE FILE ARTIFACT
  # ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest
    needs: job1

    steps:

      - name: check workspace before download
        run: |
          pwd
          ls -ltr


      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file
        # downloads artifact created in job1


      - name: check workspace after download
        run: |
          pwd
          ls -ltr
        # confirms artifact download


  # ==========================================================
  # JOB 3 : DOWNLOAD DIRECTORY ARTIFACT
  # ==========================================================
  job3:
    name: job3
    runs-on: ubuntu-latest
    needs: job1

    steps:

      - name: check workspace before download
        run: |
          pwd
          ls -ltr


      - name: download directory artifact
        uses: actions/download-artifact@v4
        with:
          name: directory_artifacts
        # downloads directory artifact


      - name: check workspace after download
        run: |
          pwd
          ls -ltr


  # ==========================================================
  # JOB 4 : DOWNLOAD ARTIFACTS TO CUSTOM DIRECTORIES
  # ==========================================================
  job4:
    name: job4
    runs-on: ubuntu-latest
    needs: job1

    steps:

      - name: create custom folders for downloads
        run: |
          mkdir -p single_file
          mkdir -p download_directory
        # creates directories where artifacts will be stored


      - name: check workspace before download
        run: |
          pwd
          ls -ltr


      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file
          path: single_file
        # downloads artifact into custom folder "single_file"


      - name: download directory artifact
        uses: actions/download-artifact@v4
        with:
          name: directory_artifacts
          path: download_directory
        # downloads artifact into custom folder "download_directory"


      - name: check workspace after download
        run: |
          pwd
          echo "checking single file directory"
          ls -ltr single_file
          echo "checking directory artifacts"
          ls -ltr download_directory



# ============================================================
# COMPLETE WORKFLOW EXECUTION FLOW
# ============================================================

# STEP 1
# A developer pushes code to the repository.

# STEP 2
# GitHub detects the push trigger and loads workflows from:
# .github/workflows/

# STEP 3
# GitHub provisions runner VMs.

# ============================================================
# JOB EXECUTION ORDER
# ============================================================

# job1 starts first.

# job2, job3, job4 depend on job1.

# After job1 finishes:
# job2, job3, job4 start in parallel.

# Execution graph:

#           job1
#        (create artifacts)
#         /     |      \
#      job2   job3   job4
#   (download) (download) (download to custom dirs)


# ============================================================
# IMPORTANT CONCEPT
# ============================================================

# GitHub runners are ephemeral machines.

# Each job runs on a new VM.

# Files created in job1 DO NOT exist in job2/3/4.

# Artifacts are used to persist files and transfer
# them between jobs in a workflow.
