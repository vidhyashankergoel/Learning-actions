name: cron-job-trigger   # Name of the workflow visible in GitHub Actions UI

# ============================================================
# WORKFLOW TRIGGERS
# ============================================================
# This workflow can start in THREE different ways:
#
# 1. CRON Schedule → Automatically every 5 minutes
# 2. workflow_dispatch → Manually from GitHub UI
# 3. push → Whenever code is pushed to any branch
#
# CRON FORMAT
# ┌──────── minute (0-59)
# │ ┌────── hour (0-23)
# │ │ ┌──── day of month (1-31)
# │ │ │ ┌── month (1-12)
# │ │ │ │ ┌ day of week (0-6) (Sunday = 0)
# │ │ │ │ │
# * * * * *
#
# */5 * * * *  → Run every 5 minutes
#
# NOTE
# GitHub may delay scheduled jobs slightly depending on platform load.
on:
  schedule:
    - cron: "*/5 * * * *"   # Trigger workflow every 5 minutes
  workflow_dispatch:        # Allow manual run from GitHub UI
  push:                     # Trigger workflow on every push

jobs:   # A workflow consists of one or more jobs.

  # ==========================================================
  # JOB 1 (Ubuntu Runner)
  # ==========================================================
  job1:
    name: job1                 # Display name in workflow UI
    runs-on: ubuntu-latest     # GitHub provisions a Linux VM

    steps:

      - name: Running single command in job1
        run: echo "Hi this is vidhya shanker"
        # Executes a shell command on the runner
        # Prints message to the workflow logs

      - name: Checking OS release for GitHub hosted runner
        run: cat /etc/os-release
        # Reads Linux OS information file
        # Shows distribution, version, and ID


  # ==========================================================
  # JOB 2 (Ubuntu Runner)
  # ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest     # Another Ubuntu runner VM is created

    steps:

      - name: Checking the hostname of runner
        run: hostname
        # Displays hostname of the runner machine
        # Each GitHub runner VM has a unique hostname

      - name: Running multiple commands
        run: |
          echo "vidhya is the best devops engineer"
          echo "today date is 05 march 2026"
        # "|" allows running multiple commands
        # sequentially inside a single step


  # ==========================================================
  # JOB 3 (Windows Runner)
  # ==========================================================
  job3:
    name: job3
    needs: job1                # Job3 will start only after job1 finishes
    runs-on: windows-latest    # GitHub provisions a Windows VM

    steps:

      - name: Job with single dependency
        run: Start-Sleep -Seconds 10
        # PowerShell command used in Windows runner
        # Pauses execution for 10 seconds

      - name: Checking runner information
        shell: pwsh
        run: Get-ComputerInfo
        # Displays Windows system information
        # such as OS version, hardware info, BIOS etc.


  # ==========================================================
  # JOB 4 (macOS Runner)
  # ==========================================================
  job4:
    name: job4
    needs: [job1, job2, job3]  # This job waits until all three jobs complete
    runs-on: macos-latest      # GitHub provisions a macOS runner

    steps:

      - name: Job for multiple dependencies
        run: sleep 10
        # Pause execution for 10 seconds

      - name: Checking runner information
        run: sw_vers
        # macOS command showing OS details
        # Example output:
        # ProductName
        # ProductVersion
        # BuildVersion


# ============================================================
# COMPLETE WORKFLOW EXECUTION FLOW
# ============================================================
#
# STEP 1
# Workflow can start in three ways:
#
#   - Every 5 minutes (CRON scheduler)
#   - Manual run from GitHub UI
#   - Push event to repository
#
#
# STEP 2
# GitHub scans the folder:
#
#   .github/workflows/
#
# and loads this workflow definition.
#
#
# STEP 3
# GitHub creates a workflow run.
#
# Jobs are analyzed for dependency relationships.
#
#
# ============================================================
# JOB EXECUTION ORDER
# ============================================================
#
# Jobs without dependencies start immediately.
#
# Therefore:
#
#   job1
#   job2
#
# run in PARALLEL.
#
#
# ============================================================
# JOB1 EXECUTION
# ============================================================
#
# GitHub creates an Ubuntu runner VM.
#
# Step 1
# Prints message:
#
#   Hi this is vidhya shanker
#
# Step 2
# Displays OS metadata from:
#
#   /etc/os-release
#
# Job1 completes.
#
#
# ============================================================
# JOB2 EXECUTION
# ============================================================
#
# Runs in parallel with job1.
#
# Step 1
# Prints hostname of the runner VM.
#
# Step 2
# Prints two echo messages.
#
# Job2 completes.
#
#
# ============================================================
# JOB3 EXECUTION (Windows Runner)
# ============================================================
#
# job3 depends on:
#
#   job1
#
# So job3 starts only after job1 completes.
#
# GitHub provisions a Windows VM.
#
# Step 1
# Wait 10 seconds.
#
# Step 2
# Run PowerShell command:
#
#   Get-ComputerInfo
#
# which prints system details.
#
# Job3 completes.
#
#
# ============================================================
# JOB4 EXECUTION (macOS Runner)
# ============================================================
#
# job4 depends on:
#
#   job1
#   job2
#   job3
#
# So it waits until ALL three jobs finish.
#
# GitHub provisions a macOS runner.
#
# Step 1
# Wait 10 seconds.
#
# Step 2
# Run macOS command:
#
#   sw_vers
#
# which prints macOS version details.
#
# Job4 completes.
#
#
# ============================================================
# JOB EXECUTION GRAPH
# ============================================================
#
#        job1 ────────┐
#                     ├── job3 ────┐
#        job2 ────────┘            │
#                                  └── job4
#
#
# Parallel Jobs
#
#   job1
#   job2
#
# Sequential dependency
#
#   job3 depends on job1
#
# Multi dependency
#
#   job4 depends on job1, job2, job3
#
#
# ============================================================
# KEY CONCEPTS DEMONSTRATED
# ============================================================
#
# Multiple workflow triggers
#   CRON
#   push
#   manual dispatch
#
# Multi-OS runners
#   Ubuntu
#   Windows
#   macOS
#
# Job dependencies using "needs"
#
# Parallel vs sequential job execution
#
# OS-specific commands
#
# Linux   → cat /etc/os-release
# Windows → Get-ComputerInfo
# macOS   → sw_vers
#
# ============================================================
