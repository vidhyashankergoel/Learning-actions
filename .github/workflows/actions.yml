name: github-actions   # Name of the workflow shown in the GitHub Actions UI
                       # This workflow is used to learn different types of actions

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# The workflow starts whenever a push event happens
# in this repository (any branch).
on:
  workflow_dispatch: 
#  push:                 # Trigger event

jobs:                   # A workflow must contain at least one job

  # ==========================================================
  # JOB 1
  # ==========================================================
  job1:
    name: job1                    # Display name of the job in the Actions UI
    runs-on: ubuntu-latest        # GitHub provisions an Ubuntu runner VM

    steps:                        # Steps inside a job run sequentially

      - name: step-1
        run: |
          pwd
          ls -ltr
          hostname
        # run executes shell commands on the runner machine
        #
        # pwd
        #   Prints the current working directory of the runner
        #
        # ls -ltr
        #   Lists files in the current directory
        #   -l → long listing format
        #   -t → sort by modification time
        #   -r → reverse order
        #
        # hostname
        #   Displays the hostname of the runner machine


      - name: step-2 checkout
        uses: actions/checkout@v4
        # "uses" tells the workflow to use an existing GitHub Action.
        #
        # actions/checkout is the most common action.
        # It downloads the repository source code from GitHub
        # into the runner's working directory.
        #
        # Without this step, the runner does NOT automatically
        # have access to the repository files.


      - name: step3
        run: |
          pwd
          ls -ltr
          hostname
        # Running the same commands again AFTER the checkout step
        #
        # This helps demonstrate that:
        #
        # Before checkout → repository files are not present
        # After checkout  → repository files are available
        #
        # So ls -ltr will now show repository contents.



# ============================================================
# COMPLETE WORKFLOW EXECUTION FLOW
# ============================================================
#
# STEP 1
# A developer pushes code to the repository.
#
# STEP 2
# GitHub detects the "push" event.
#
# STEP 3
# GitHub scans the repository folder:
#
#   .github/workflows/
#
# to find workflow files that respond to the push event.
#
# STEP 4
# GitHub finds this workflow:
#
#   github-actions
#
# STEP 5
# GitHub creates a workflow run.
#
# STEP 6
# Since only one job exists (job1),
# GitHub provisions one runner VM:
#
#   Ubuntu Linux machine
#
#
# ============================================================
# JOB EXECUTION
# ============================================================
#
# STEP 1
# Runner starts and prepares workspace.
#
#
# STEP 2 (step-1)
#
# Commands executed:
#
#   pwd
#   ls -ltr
#   hostname
#
# At this point the repository code has NOT yet been downloaded.
#
# So ls will show only default runner directories.
#
#
# STEP 3 (step-2 checkout)
#
# The action:
#
#   actions/checkout
#
# downloads the repository code into the runner workspace.
#
# Repository files are now available inside the runner.
#
#
# STEP 4 (step3)
#
# Commands executed again:
#
#   pwd
#   ls -ltr
#   hostname
#
# Now ls will show repository files because checkout happened.
#
#
# STEP 5
# Job completes successfully.
#
# Workflow run is marked SUCCESS.
#
#
# ============================================================
# KEY CONCEPTS DEMONSTRATED
# ============================================================
#
# Workflow
#   A CI/CD automation pipeline.
#
# Trigger
#   push event.
#
# Job
#   Unit of work executed on a runner.
#
# Runner
#   Virtual machine where jobs run.
#
# Steps
#   Sequential commands executed inside a job.
#
# run
#   Executes shell commands.
#
# uses
#   Executes an external GitHub Action.
#
#
# Most important concept demonstrated:
#
# Repository code is NOT available by default.
# It must be fetched using:
#
#   actions/checkout
#
# ============================================================
