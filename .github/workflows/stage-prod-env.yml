name: stage-prod-env   # Workflow name shown in GitHub Actions UI

# ============================================================
# WORKFLOW TRIGGERS
# ============================================================
# This workflow runs on:
# 1. push to main
# 2. push to dev
# 3. pull request targeting main

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main


# ============================================================
# GLOBAL ENVIRONMENT VARIABLES
# ============================================================

env:
  ENV_TYPE: Dev
  APP_USER: vidhya101
  APP_PORT: 80


jobs:

  # ==========================================================
  # JOB 1 : CREATE AND UPLOAD ARTIFACTS
  # ==========================================================
  job1:
    name: job1
    runs-on: ubuntu-latest

    steps:
      - name: step-1 basic system information
        run: |
          pwd
          ls -ltr
          hostname

      - name: step-2 checkout repository
        uses: actions/checkout@v4

      - name: step-3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt

      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt



  # ==========================================================
  # JOB 2 : DOWNLOAD ARTIFACT AND USE WORKFLOW ENV + SECRET
  # ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - name: check workspace before download
        run: |
          pwd
          ls -ltr

      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file

      - name: referring workflow env variables
        run: |
          echo "[INFO] Running deployment for $ENV_TYPE with user $APP_USER."
          echo "[INFO] Once deployment completes, application will be accessible on port $APP_PORT."

      - name: referring repository secret
        run: |
          echo "[INFO] Application password is ${{ secrets.APP_PASSWORD }}."



  # ==========================================================
  # JOB 3 : USING CONTEXTS AND BUILT-IN VARIABLES
  # ==========================================================
  job3:
    name: job3
    runs-on: ubuntu-latest

    steps:
      - name: referring contexts and built-in values
        run: |
          echo "[INFO] Triggered by event: ${{ github.event_name }}"
          echo "[INFO] Change made by user: ${{ github.actor }}"
          echo "[INFO] Branch where change happened: ${{ github.ref_name }}"
          echo "[INFO] Runner OS: ${{ runner.os }}"
          echo "[INFO] Current Job ID: ${{ job.check_run_id }}"



  # ==========================================================
  # JOB 4 : STAGING DEPLOYMENT
  # ==========================================================
  staging:
    name: STAGE DEPLOYMENT
    runs-on: ubuntu-latest

    # staging should only run when code is pushed to dev
    # prevents PR deployments and matches environment rule
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    needs: [job1, job2, job3]

    environment:
      name: STAGING

    steps:
      - name: referring environment variables
        run: |
          echo "[INFO] Running deployment on ${{ vars.HOST }} using ${{ vars.USER }}."

      - name: referring environment secret
        run: |
          echo "[INFO] Password for ${{ vars.USER }} is ${{ secrets.PASSWORD }}."



  # ==========================================================
  # JOB 5 : PRODUCTION DEPLOYMENT
  # ==========================================================
  production:
    name: PRODUCTION DEPLOYMENT
    runs-on: ubuntu-latest

    # production should only run when pushing to main
    # prevents PR deployment errors like refs/pull/1/merge
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    needs: [job1, job2, job3]

    environment:
      name: PRODUCTION

    steps:
      - name: referring environment variables
        run: |
          echo "[INFO] Running deployment on ${{ vars.HOST }} using ${{ vars.USER }}."

      - name: referring environment secret
        run: |
          echo "[INFO] Password for ${{ vars.USER }} is ${{ secrets.PASSWORD }}."



# ============================================================
# COMPLETE PIPELINE FLOW
# ============================================================

# Pull Request → main
# job1
# job2
# job3
# staging skipped
# production skipped

# Push → dev
# job1
# job2
# job3
# staging deploy

# Push → main
# job1
# job2
# job3
# production deploy
