name: branches   # Workflow name visible in GitHub Actions UI

# ============================================================
# WORKFLOW TRIGGERS
# ============================================================
# GitHub Actions workflows run when specific EVENTS occur
# in the repository.
#
# In this workflow we use two events:
#
# 1) push
# 2) pull_request
#
# ------------------------------------------------------------
# PUSH EVENT
# ------------------------------------------------------------
# A push event occurs when commits are sent to the remote
# repository using a command like:
#
#   git push origin <branch-name>
#
# Example:
#
#   git push origin main
#
# When a push happens, GitHub checks the branch name.
# If the branch matches the configuration below,
# the workflow will start automatically.

# ------------------------------------------------------------
# PULL REQUEST EVENT
# ------------------------------------------------------------
# A pull request (PR) occurs when a developer proposes
# merging one branch into another.
#
# Example:
#
# feature-login  --->  main
#
# The developer opens a Pull Request in the GitHub UI
# requesting the feature branch be merged into main.
#
# Before the merge is allowed, CI workflows run to verify:
#
# • code builds successfully
# • tests pass
# • security scans succeed
#
# If any required checks fail, the PR cannot be merged
# when branch protection rules are enabled.

on:

  # ==========================================================
  # PUSH EVENT CONFIGURATION
  # ==========================================================
  push:
    branches:
      - main           # Workflow runs when commits are pushed to main

  # ==========================================================
  # PULL REQUEST EVENT CONFIGURATION
  # ==========================================================
  pull_request:
    branches:
      - main
      # Workflow runs when a Pull Request targets the main branch.
      #
      # Events that trigger it include:
      # - opening a PR
      # - updating commits in a PR
      # - synchronizing a PR with new commits


jobs:

  # ==========================================================
  # JOB 1 : CREATE AND UPLOAD ARTIFACTS
  # ==========================================================
  job1:
    name: job1
    runs-on: ubuntu-latest      # GitHub provides a fresh Ubuntu runner

    steps:

      - name: step-1 basic system information
        run: |
          pwd
          ls -ltr
          hostname
        # pwd
        #   prints the current working directory of the runner
        #
        # ls -ltr
        #   lists files in the workspace directory
        #
        # hostname
        #   shows the hostname of the GitHub runner machine


      - name: step-2 checkout repository
        uses: actions/checkout@v4
        # GitHub runners start with an empty workspace.
        #
        # The checkout action downloads the repository
        # contents into the runner so the workflow
        # can access project files.


      - name: step-3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt

        # Files created in this step:
        #
        # myartifact.txt
        #   contains the runner working directory
        #
        # artifacts/list.txt
        #   contains the output of ls -ltr
        #
        # artifacts/hostname.txt
        #   contains the hostname of the runner


      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt

        # Uploads a single file artifact.
        #
        # Artifacts are files saved by GitHub Actions
        # so they can be used later by other jobs.


      - name: upload directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/

        # Uploads the entire artifacts directory
        # as a single artifact package.


      - name: upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths
          path: |
            ./myartifact.txt
            artifacts/

        # Uploads multiple paths together
        # under a single artifact name.


      - name: upload multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths-with-exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt

        # Uploads files but excludes hostname.txt.
        #
        # "!" is used to exclude files using glob patterns.


  # ==========================================================
  # JOB 2 : DOWNLOAD ARTIFACT
  # ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest
    needs: job1     # job2 will start only after job1 finishes successfully

    steps:

      - name: check workspace before download
        run: |
          pwd
          ls -ltr

        # Shows the workspace contents before
        # downloading artifacts.


      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file

        # Downloads the artifact created in job1.


      - name: check workspace after download
        run: |
          pwd
          ls -ltr

        # Verifies that the artifact was downloaded
        # successfully into the workspace.


      # ======================================================
      # STEP TO DEMONSTRATE FAILED CHECKS
      # ======================================================
      - name: intentionally fail job for PR protection demo
        run: exit 0

        # exit 1 forces the step to fail.
        #
        # This is useful when demonstrating:
        #
        # • pull request checks
        # • branch protection rules
        # • required CI checks before merge
        #
        # When this step fails:
        #
        # job2 = FAILED
        #
        # If branch protection requires successful checks,
        # GitHub will BLOCK the PR merge.


# ============================================================
# COMPLETE WORKFLOW EXECUTION FLOW
# ============================================================

# STEP 1
# A developer pushes code OR opens a pull request.

# ------------------------------------------------------------
# PUSH FLOW
# ------------------------------------------------------------
#
# Developer runs:
#
#   git push origin main
#
# GitHub detects the push event and triggers this workflow.


# ------------------------------------------------------------
# PULL REQUEST FLOW
# ------------------------------------------------------------
#
# Example:
#
# feature-login  --->  main
#
# When the PR is opened, GitHub runs this workflow
# to validate the code before merging.


# ============================================================
# JOB EXECUTION ORDER
# ============================================================

# job1 runs first
#
# job2 depends on job1

# Execution graph:

#   job1
#    |
#   job2


# ============================================================
# IMPORTANT CONCEPT
# ============================================================

# GitHub runners are EPHEMERAL machines.

# Each job runs on a completely fresh virtual machine.

# Therefore:
#
# Files created in job1 DO NOT exist in job2 automatically.

# To transfer files between jobs we use:

# ARTIFACTS

# upload-artifact  -> store files
# download-artifact -> retrieve files
