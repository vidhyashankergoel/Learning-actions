name: branches   # Workflow name visible in GitHub Actions UI

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# GitHub Actions workflows start when specific EVENTS happen.
#
# Two events are configured here:
#
# 1) push
# 2) pull_request
#
# PUSH EVENT
# ----------
# A push event occurs when someone sends commits to the remote
# repository using:
#
#   git push origin <branch>
#
# Example:
#
#   git push origin dev
#
# When a push happens, GitHub checks the branch name and
# triggers the workflow if it matches the configured branches.
#
# PULL REQUEST EVENT
# ------------------
# A pull request event occurs when a developer requests
# to merge changes from one branch into another branch.
#
# Example:
#
# feature-login  ---->  main
#
# The developer opens a PR on GitHub UI requesting that
# the feature branch be merged into main.
#
# The workflow runs automatically to validate the changes
# before the merge happens.
#
# This is commonly used for:
#
#   running tests
#   running security scans
#   verifying build pipelines
#
# It helps protect important branches like "main".

on:

  # ==========================================================
  # PUSH EVENT CONFIGURATION
  # ==========================================================
  push:
    branches:
      - dev            # runs workflow when code is pushed to dev branch
      - 'feature-*'    # runs for branches like feature-login, feature-api, feature-ui
      - main           # runs when code is pushed to main branch

  # ==========================================================
  # PULL REQUEST EVENT CONFIGURATION
  # ==========================================================
  pull_request:
    branches:
      - main
      # This means:
      # Run workflow when a pull request is opened,
      # synchronized, or updated targeting the main branch.
      #
      # Example:
      #
      # feature-login  --->  main
      #
      # If someone opens a PR from feature-login into main,
      # the workflow will execute.


jobs:

  # ==========================================================
  # JOB 1 : CREATE AND UPLOAD ARTIFACTS
  # ==========================================================
  job1:
    name: job1
    runs-on: ubuntu-latest      # GitHub provisions an Ubuntu runner VM

    steps:

      - name: step-1 basic system information
        run: |
          pwd
          ls -ltr
          hostname
        # pwd
        #   prints current working directory of runner
        #
        # ls -ltr
        #   lists files in workspace
        #
        # hostname
        #   shows runner hostname


      - name: step-2 checkout repository
        uses: actions/checkout@v4
        # downloads repository source code into runner workspace
        #
        # Important:
        # GitHub runners start with an empty workspace.
        # checkout action pulls repository code into the runner.


      - name: step-3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
        # files created:
        #
        # myartifact.txt
        # artifacts/list.txt
        # artifacts/hostname.txt


      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt
        # uploads a single artifact file


      - name: upload directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/
        # uploads entire directory


      - name: upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths
          path: |
            ./myartifact.txt
            artifacts/
        # uploads both file and directory


      - name: upload multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths-with-exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt
        # uploads files but excludes hostname.txt


  # ==========================================================
  # JOB 2 : DOWNLOAD SINGLE FILE ARTIFACT
  # ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest
    needs: job1                 # job2 starts only after job1 finishes

    steps:

      - name: check workspace before download
        run: |
          pwd
          ls -ltr
        # shows workspace before artifact download


      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file
        # downloads artifact created in job1


      - name: check workspace after download
        run: |
          pwd
          ls -ltr
        # verifies artifact has been downloaded

#add step to fail job 2 
      - name: step for PR demo 
        run: exit 1 



# ============================================================
# COMPLETE WORKFLOW EXECUTION FLOW
# ============================================================

# STEP 1
# A developer pushes code OR opens a pull request.

# PUSH FLOW
# ---------
# Developer runs:
#
#   git push origin dev
#
# GitHub receives the push event.
#
# GitHub checks the branch name.
#
# If branch matches:
#
#   dev
#   main
#   feature-*
#
# the workflow starts.


# PULL REQUEST FLOW
# -----------------
# Developer opens a pull request.
#
# Example:
#
# feature-login  --->  main
#
# GitHub triggers workflow to validate the PR.
#
# This allows teams to run:
#
#   tests
#   builds
#   security scans
#
# before merging code.


# ============================================================
# JOB EXECUTION ORDER
# ============================================================

# job1 starts first
#
# job2 depends on job1
#
# execution graph
#
#   job1
#    |
#   job2


# ============================================================
# IMPORTANT CONCEPT
# ============================================================

# GitHub runners are ephemeral machines.

# Each job runs on a fresh VM.

# Files created in job1 do not exist in job2.

# Artifacts allow transferring files between jobs.

