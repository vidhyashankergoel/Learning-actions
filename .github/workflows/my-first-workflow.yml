name: my-first-workflow   # Name of the workflow. This is what appears in the GitHub Actions UI.

# ------------------------------------------------------------
# WORKFLOW TRIGGER
# ------------------------------------------------------------
# This workflow will run automatically every time a push
# happens in this repository (any branch).
on: push

jobs:   # A workflow is composed of one or more jobs.

  # ==========================================================
  # JOB 1
  # ==========================================================
  job1:                  # Unique Job ID used internally by GitHub
    name: job1           # Friendly name displayed in GitHub UI
    runs-on: ubuntu-latest   # Runner machine where job executes (GitHub hosted Ubuntu VM)

    steps:               # Steps define the sequence of commands executed in this job
                         # Steps inside a job always run sequentially

      - name: Running single command in job1
        run: echo "Hi this is vidhya shanker"
        # "run" executes a shell command inside the runner
        # Here it simply prints a message in the job logs

      - name: Checking OS release for Github hosted runner
        run: cat /etc/os-release

      - name: calling sleep 
        run: sleep 20 
        # This command reads OS metadata from the Linux system
        # It shows information like:
        #   OS name
        #   OS version
        #   distribution ID
        # Useful to verify what OS the runner is using


  # ==========================================================
  # JOB 2
  # ==========================================================
  job2:                   # Job identifier
    name: job2            # Display name of job
    runs-on: ubuntu-latest   # This job also runs on GitHub Ubuntu runner

    steps:                 # Steps executed inside this job

      - name: checking the Hostname of runner
        run: hostname
        # "hostname" command prints the machine hostname
        # Each GitHub runner VM has a unique hostname
        # Useful for debugging or identifying which runner executed the job

      - name: running multiple commands
        run: |
          echo " vidhya is the best devops engineer"
          echo "today date is 05 march 2026"
          sleep 20
        # The "|" allows multi-line shell commands
        # Both commands will execute sequentially in the same step
        # First line prints a message
        # Second line prints today's date message



# ==========================================================
# COMPLETE WORKFLOW EXECUTION FLOW (Explanation)
# ==========================================================
#
# Step 1:
# A developer pushes code to any branch in the repository.
#
# Step 2:
# GitHub Actions detects the "push" event.
#
# Step 3:
# GitHub looks inside the .github/workflows folder and finds
# this workflow file named "my-first-workflow".
#
# Step 4:
# GitHub creates a workflow run.
#
# Step 5:
# The workflow contains two jobs:
#   job1
#   job2
#
# Since there is no dependency defined between them,
# both jobs start in parallel.
#
#
# Step 6:
# GitHub provisions two separate Ubuntu virtual machines
# (runners) for the jobs.
#
#
# Step 7:
# JOB1 execution:
#
# Runner VM starts.
# Step 1 prints message:
#     Hi this is vidhya shanker
#
# Step 2 reads OS release file and prints details like:
#     Ubuntu version
#     OS name
#     kernel version
#
#
# Step 8:
# JOB2 execution:
#
# Another runner VM starts independently.
#
# Step 1 prints hostname of runner machine.
#
# Step 2 runs two echo commands:
#     vidhya is the best devops engineer
#     today date is 05 march 2026
#
#
# Step 9:
# After all steps finish successfully, both jobs complete.
#
#
# Step 10:
# Workflow status becomes SUCCESS.
#
#
# ==========================================================
# KEY CONCEPTS THIS WORKFLOW TEACHES
# ==========================================================
#
# Workflow → Top-level automation pipeline
#
# Jobs → Independent units of work
#
# Steps → Commands executed inside a job
#
# Runner → Machine where jobs execute
#
# run → Executes shell commands
#
#
# Important behavior:
#
# Jobs run in PARALLEL by default
# Steps run SEQUENTIALLY inside a job
#
#
# ==========================================================
#
# This is a basic GitHub Actions workflow used to understand
# job execution, runners, and step execution.
#
# ==========================================================
