name: artifact-actions   # Name of the workflow shown in the GitHub Actions UI
                         # This workflow demonstrates different ways to upload artifacts

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# The workflow starts whenever a push event happens
# in this repository (any branch).
on:
  push:                  # Trigger event

jobs:                    # A workflow must contain at least one job

  # ==========================================================
  # JOB 1
  # ==========================================================
  job1:
    name: job1                 # Display name of the job in the GitHub UI
    runs-on: ubuntu-latest     # GitHub provisions an Ubuntu runner VM

    steps:                     # Steps inside a job execute sequentially

      - name: step-1
        run: |
          pwd
          ls -ltr
          hostname
        # pwd
        #   Prints the current working directory of the runner
        #
        # ls -ltr
        #   Lists files and directories in the runner workspace
        #
        # hostname
        #   Displays the hostname of the runner machine


      - name: step-2 checkout
        uses: actions/checkout@v4
        # Downloads repository source code to the runner workspace
        #
        # Without checkout:
        #   The runner does not automatically contain repository files
        #
        # actions/checkout clones the repository so workflow
        # steps can access project files.


      - name: step3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
        # echo `pwd`
        #   Executes pwd and writes the working directory path
        #   into file "myartifact.txt"
        #
        # mkdir artifacts
        #   Creates a directory named "artifacts"
        #
        # echo `ls -ltr`
        #   Saves directory listing output into artifacts/list.txt
        #
        # echo `hostname`
        #   Saves the runner hostname into artifacts/hostname.txt


      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt
        # Uploads a single file as an artifact
        #
        # Artifact name:
        #   single-file
        #
        # File uploaded:
        #   myartifact.txt


      - name: upload from directory
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/
        # Uploads an entire directory as an artifact
        #
        # Everything inside "artifacts/" will be stored
        # as one artifact bundle.


      - name: upload from multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths
          path: |
            ./myartifact.txt
            artifacts/
        # Uploads multiple paths together
        #
        # Includes:
        #   myartifact.txt
        #   artifacts directory


      - name: upload from multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths-with-exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt
        # Uploads multiple paths but excludes specific files
        #
        # Included:
        #   myartifact.txt
        #   artifacts directory
        #
        # Excluded:
        #   hostname.txt
        #
        # "!" is used for path exclusion patterns.



# ============================================================
# COMPLETE WORKFLOW EXECUTION FLOW
# ============================================================
#
# STEP 1
# A developer pushes code to the repository.
#
#
# STEP 2
# GitHub detects the push event and scans the directory:
#
#   .github/workflows/
#
# for workflows triggered by push.
#
#
# STEP 3
# GitHub loads this workflow:
#
#   artifact-actions
#
# and creates a workflow run.
#
#
# STEP 4
# GitHub provisions a runner VM:
#
#   Ubuntu Linux virtual machine
#
#
# ============================================================
# JOB EXECUTION PROCESS
# ============================================================
#
# STEP 1
# First step prints system information:
#
#   pwd
#   ls -ltr
#   hostname
#
#
# STEP 2
# Repository code is downloaded using:
#
#   actions/checkout
#
# Now workflow has access to project files.
#
#
# STEP 3
# Files and directories are created:
#
#   myartifact.txt
#
#   artifacts/
#       list.txt
#       hostname.txt
#
#
# STEP 4
# Artifacts are uploaded to GitHub storage.
#
# Upload methods demonstrated:
#
# 1) Single file upload
#
#   myartifact.txt
#
#
# 2) Directory upload
#
#   artifacts/
#
#
# 3) Multiple path upload
#
#   myartifact.txt + artifacts/
#
#
# 4) Multiple path upload with exclusion
#
#   hostname.txt excluded
#
#
# ============================================================
# WHY ARTIFACTS ARE IMPORTANT
# ============================================================
#
# GitHub runners are ephemeral machines.
#
# After a job finishes:
#
#   the runner VM is destroyed
#
# Any files created during execution are lost.
#
# Artifacts allow you to store files permanently
# in the workflow run.
#
#
# ============================================================
# REAL WORLD USE CASES
# ============================================================
#
# Build pipelines
#   store compiled binaries
#
# Test pipelines
#   store test reports
#
# Data pipelines
#   store generated datasets
#
# Release pipelines
#   store packages before publishing
#
# Multi-job pipelines
#   share files between jobs
#
#
# ============================================================
# KEY CONCEPTS DEMONSTRATED
# ============================================================
#
# Workflow triggers
#   push
#
# Runner environment
#   ubuntu-latest
#
# Artifact creation
#
# Artifact upload patterns
#   single file
#   directory
#   multiple paths
#   path exclusion
#
# ============================================================
