replicaCount: 3

image:
  repository: ghcr.io/vidhyashankergoel/vidhya_app
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

deployment:
  name: vidhya-deployment

service:
  name: vidhya-service
  type: NodePort
  port: 80
  targetPort: 8000
  nodePort: 30007

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "250m"

env: []

livenessProbe:
  enabled: true
  path: /
  port: 8000

readinessProbe:
  enabled: true
  path: /
  port: 8000

# Optional serviceAccount creation (disabled by default)
serviceAccount:
  create: false
  name: ""

# Horizontal pod autoscaler (optional)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80