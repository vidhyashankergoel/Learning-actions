sonar.projectKey=vidhyashankergoel_Learning-actions
sonar.organization=vidhyashankergoel-1


# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Learning-actions
sonar.projectVersion=1.0

#coverage report path
sonar.python.coverage.reportPaths=reports/coverage.xml

#unit test report path
sonar.python.xunit.reportPath=reports/unit-test-results.xml

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# Exclude tests from coverage calculation
sonar.coverage.exclusions=tests/**

# Exclude tests from code analysis as well
sonar.exclusions=tests/**

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8